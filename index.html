<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>装修全流程指南 - 精装房/毛坯房/自建房</title>
<style>
  :root {
    --bg: #f5f3ef;
    --card: #ffffff;
    --text: #2c2c2c;
    --text-secondary: #666;
    --border: #e8e4df;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --radius: 12px;
    /* 精装房 */
    --color-stone: #5f8b6f;
    --color-stone-light: #e8f2ea;
    --color-stone-bg: #f2f8f4;
    /* 毛坯房 */
    --color-raw: #4a6fa5;
    --color-raw-light: #e6eef8;
    --color-raw-bg: #f2f6fc;
    /* 自建房 */
    --color-self: #c4823e;
    --color-self-light: #fdf0e0;
    --color-self-bg: #fef9f2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 0 10px;
  }
  .header .icon { font-size: 48px; margin-bottom: 8px; }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .header p {
    color: var(--text-secondary);
    font-size: 15px;
  }

  /* Type Selector */
  .type-selector {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 28px 0;
    flex-wrap: wrap;
  }
  .type-btn {
    flex: 1;
    min-width: 140px;
    max-width: 220px;
    padding: 16px 20px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--card);
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-secondary);
    position: relative;
  }
  .type-btn:hover {
    border-color: #ccc;
    transform: translateY(-1px);
    box-shadow: var(--shadow);
  }
  .type-btn .emoji { font-size: 28px; display: block; margin-bottom: 6px; }
  .type-btn .sub { font-size: 12px; font-weight: 400; color: #999; margin-top: 4px; }

  .type-btn.active-stone { border-color: var(--color-stone); background: var(--color-stone-bg); color: var(--color-stone); }
  .type-btn.active-raw { border-color: var(--color-raw); background: var(--color-raw-bg); color: var(--color-raw); }
  .type-btn.active-self { border-color: var(--color-self); background: var(--color-self-bg); color: var(--color-self); }

  /* Stats Bar */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin: 20px 0 28px;
    flex-wrap: wrap;
  }
  .stat-item {
    text-align: center;
    padding: 12px 20px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    min-width: 100px;
  }
  .stat-item .num { font-size: 24px; font-weight: 700; }
  .stat-item .label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .stat-stone .num { color: var(--color-stone); }
  .stat-raw .num { color: var(--color-raw); }
  .stat-self .num { color: var(--color-self); }

  /* Phase Card */
  .phase-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    overflow: hidden;
    transition: all 0.2s ease;
    border: 1px solid var(--border);
  }
  .phase-card.completed { opacity: 0.7; }

  .phase-header {
    display: flex;
    align-items: center;
    padding: 18px 20px;
    cursor: pointer;
    user-select: none;
    gap: 14px;
    transition: background 0.15s;
  }
  .phase-header:hover { background: #fafaf8; }

  .phase-number {
    width: 42px; height: 42px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700;
    flex-shrink: 0;
    color: #fff;
  }
  .phase-number.stone { background: var(--color-stone); }
  .phase-number.raw { background: var(--color-raw); }
  .phase-number.self { background: var(--color-self); }

  .phase-info { flex: 1; min-width: 0; }
  .phase-title { font-size: 17px; font-weight: 600; }
  .phase-time { font-size: 13px; color: var(--text-secondary); }

  .phase-arrow {
    font-size: 20px; color: #bbb; transition: transform 0.3s;
    flex-shrink: 0;
  }
  .phase-card.open .phase-arrow { transform: rotate(180deg); }

  .phase-check {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer;
    border: 2px solid #ddd;
    background: #fff;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .phase-check:hover { border-color: #aaa; }
  .phase-check.done { background: #4caf50; border-color: #4caf50; color: #fff; }

  /* Phase Detail */
  .phase-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }
  .phase-detail-inner {
    padding: 0 20px 20px;
    border-top: 1px solid var(--border);
  }
  .phase-card.open .phase-detail { max-height: 3000px; }

  .detail-section {
    margin-top: 16px;
  }
  .detail-section h4 {
    font-size: 14px; font-weight: 600;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .detail-section h4 .dot {
    width: 6px; height: 6px;
    border-radius: 50%; display: inline-block;
  }
  .dot.stone { background: var(--color-stone); }
  .dot.raw { background: var(--color-raw); }
  .dot.self { background: var(--color-self); }

  .step-list { list-style: none; }
  .step-list li {
    padding: 8px 12px 8px 28px;
    position: relative;
    font-size: 14px;
    line-height: 1.7;
    border-left: 2px solid #eee;
    margin-left: 6px;
  }
  .step-list li::before {
    content: '';
    position: absolute; left: -6px; top: 14px;
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid #ccc; background: #fff;
  }
  .step-list li:last-child { border-left-color: transparent; }
  .step-list li.stone-dot::before { border-color: var(--color-stone); }
  .step-list li.raw-dot::before { border-color: var(--color-raw); }
  .step-list li.self-dot::before { border-color: var(--color-self); }

  .precaution-box {
    background: #fffbf5;
    border: 1px solid #fde68a;
    border-radius: 8px;
    padding: 12px 16px;
    margin-top: 12px;
    font-size: 13px;
    line-height: 1.7;
  }
  .precaution-box .warn-icon { margin-right: 4px; }
  .precaution-box strong { color: #b45309; }

  .tooltip-box {
    background: #f0f7ff;
    border: 1px solid #b3d4ff;
    border-radius: 8px;
    padding: 12px 16px;
    margin-top: 8px;
    font-size: 13px;
  }
  .tooltip-box .tip-icon { margin-right: 4px; }
  .tooltip-box strong { color: #2563eb; }

  /* Progress Bar */
  .progress-container {
    margin: 20px 0 24px;
  }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 13px; color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 6px; background: #e8e4df; border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.3s ease;
  }
  .progress-fill.stone { background: var(--color-stone); }
  .progress-fill.raw { background: var(--color-raw); }
  .progress-fill.self { background: var(--color-self); }

  /* Jump to top */
  .jump-top {
    position: fixed; bottom: 24px; right: 24px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--card);
    box-shadow: 0 2px 16px rgba(0,0,0,0.12);
    border: none; cursor: pointer;
    font-size: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
    z-index: 100;
  }
  .jump-top.visible { opacity: 1; pointer-events: auto; }

  /* Quick Nav */
  .quick-nav {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 20px;
    justify-content: center;
  }
  .quick-nav-btn {
    padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--card);
    font-size: 13px; cursor: pointer; transition: all 0.15s;
    color: var(--text-secondary);
  }
  .quick-nav-btn:hover { border-color: #aaa; background: #fafafa; }
  .quick-nav-btn.active-stone { border-color: var(--color-stone); color: var(--color-stone); background: var(--color-stone-light); font-weight: 600; }
  .quick-nav-btn.active-raw { border-color: var(--color-raw); color: var(--color-raw); background: var(--color-raw-light); font-weight: 600; }
  .quick-nav-btn.active-self { border-color: var(--color-self); color: var(--color-self); background: var(--color-self-light); font-weight: 600; }

  /* Reset button */
  .reset-bar {
    text-align: center; margin: 24px 0;
  }
  .reset-btn {
    padding: 8px 20px; border-radius: 20px;
    border: 1px solid #ddd; background: var(--card);
    font-size: 13px; cursor: pointer; color: var(--text-secondary);
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: #999; color: var(--text); }

  /* Responsive */
  @media (max-width: 600px) {
    .header h1 { font-size: 22px; }
    .type-btn { padding: 12px 14px; font-size: 14px; min-width: 100px; }
    .type-btn .emoji { font-size: 22px; }
    .stats-bar { gap: 12px; }
    .stat-item { padding: 10px 14px; min-width: 80px; }
    .stat-item .num { font-size: 20px; }
    .phase-header { padding: 14px 16px; }
    .phase-title { font-size: 15px; }
    .phase-detail-inner { padding: 0 14px 16px; }
    .step-list li { font-size: 13px; padding: 6px 10px 6px 24px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="icon">🏠</div>
    <h1>装修全流程指南</h1>
    <p>精装房 · 毛坯房 · 自建房 — 再也不怕搞不清流程了</p>
  </div>

  <!-- Type Selector -->
  <div class="type-selector" id="typeSelector">
    <div class="type-btn active-raw" data-type="raw" onclick="switchType('raw')">
      <span class="emoji">🧱</span>
      毛坯房
      <div class="sub">从零开始 · 全流程装修</div>
    </div>
    <div class="type-btn" data-type="stone" onclick="switchType('stone')">
      <span class="emoji">✨</span>
      精装房
      <div class="sub">收房改造 · 软装进场</div>
    </div>
    <div class="type-btn" data-type="self" onclick="switchType('self')">
      <span class="emoji">🏡</span>
      自建房
      <div class="sub">独立宅院 · 从建到装</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- Progress -->
  <div class="progress-container">
    <div class="progress-label">
      <span>整体进度</span>
      <span id="progressText">0 / 0 阶段完成</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill raw" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Quick Nav -->
  <div class="quick-nav" id="quickNav"></div>

  <!-- Phases -->
  <div id="phasesContainer"></div>

  <!-- Reset -->
  <div class="reset-bar">
    <button class="reset-btn" onclick="resetAll()">🔄 重置所有勾选状态</button>
  </div>

</div>

<button class="jump-top" id="jumpTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆</button>

<script>
// ============ DATA ============
const data = {
  raw: {
    name: '毛坯房',
    emoji: '🧱',
    color: 'raw',
    phases: [
      {
        id: 'r1', title: '第 1 阶段：前期准备与设计规划', time: '约 7-15 天',
        steps: [
          '收房验房：检查墙面空鼓、裂缝、渗水，测量层高和平整度',
          '明确装修风格与预算：参考装修案例图，确定整体风格（现代/简约/新中式等）',
          '选择装修方式：清包（自己买所有材料）、半包（自己买主材）或全包',
          '找设计师/装修公司：多比较 2-3 家，看工地看口碑，签正规合同',
          '量房出图：设计师上门实测，出平面布局图、水电图、效果图',
          '办理物业装修手续：提交施工图纸，缴纳装修押金'
        ],
        precautions: '前期规划是整个装修最关键的一步！风格不确定就开工，后面改起来费钱又费时。建议至少花一周时间逛建材市场和家具城，心里有数了再动工。合同一定要写清楚材料品牌、规格、环保等级。'
      },
      {
        id: 'r2', title: '第 2 阶段：主体拆改', time: '约 3-7 天',
        steps: [
          '拆除非承重墙、砌新墙：明确承重结构，严禁动承重墙和剪力墙',
          '铲除原墙皮：直到露出水泥层，方便后续批灰',
          '封阳台、换窗户：确定好窗户材质和开启方式',
          '新砌墙体：植筋挂网，新旧墙连接处植入钢筋',
          '清理建筑垃圾：及时运走，不要堵塞公共区域'
        ],
        precautions: '⚠️ 承重墙绝对不能动！敲之前确认图纸。砌新墙一定要植筋+挂钢丝网，否则以后百分百开裂。拆改时把下水管口和地漏用布堵住，防止碎渣掉进去堵管。'
      },
      {
        id: 'r3', title: '第 3 阶段：水电改造（隐蔽工程）', time: '约 7-12 天',
        steps: [
          '水电定位：确定所有开关、插座、龙头、花洒位置，画在墙上',
          '开槽布管：墙面开槽，布设水管和电管，强弱电分开走',
          '水管打压测试：加压到 0.8MPa，保持 30 分钟不掉压才算合格',
          '电路绝缘测试：确保无短路漏电',
          '拍照留底：水电走向全部拍照存档，方便日后维修定位',
          '中央空调/新风/地暖定位：如有这些设备，此时确定位置和管路'
        ],
        precautions: '⚠️ 水电是装修的「血管」，一旦封起来再改代价极大！插座宁可多留几个，尤其是厨房、电视墙、床头。水管建议走顶（吊顶内）便于以后检修漏水。强弱电线管交叉处要包锡纸防干扰。完工后一定要全屋拍照存档！'
      },
      {
        id: 'r4', title: '第 4 阶段：防水工程', time: '约 3-5 天',
        steps: [
          '卫生间防水：地面+墙面（淋浴区做到 1.8 米，其他区域做到 30cm）',
          '厨房/阳台防水：地面全做，墙面翻边 30cm',
          '闭水试验：蓄水 3-5cm 深，保持 48 小时',
          '到楼下检查：确认无渗漏后方可进行下一步',
          '防水保护层：防水层干透后做水泥砂浆保护'
        ],
        precautions: '⚠️ 防水是装修最容易出问题的地方！闭水试验必须做满 48 小时，自己下楼去看。卫生间门口要做出防水坎，防止水往外渗。管道根部、墙角、地漏周围要加强处理。'
      },
      {
        id: 'r5', title: '第 5 阶段：泥瓦工程', time: '约 15-20 天',
        steps: [
          '瓷砖铺贴：先贴墙砖再贴地砖，从里往外铺',
          '地面找平：水泥砂浆找平，预留地板厚度',
          '门槛石/窗台石安装',
          '地漏安装：确保排水坡度正确',
          '瓷砖美缝：瓷砖铺完干透后做，选耐脏耐磨的美缝剂',
          '卫生间回填：如用陶粒回填，注意不要破坏防水'
        ],
        precautions: '先贴墙砖再贴地砖可以避免踩坏地砖。瓷砖最好多买 5%-10% 作为损耗备料。贴完用空鼓锤检查，单片空鼓率不超过 5%。地漏要选防臭的深水封地漏。'
      },
      {
        id: 'r6', title: '第 6 阶段：木工工程', time: '约 10-15 天',
        steps: [
          '吊顶制作：轻钢龙骨+石膏板，留出灯位和检修口',
          '背景墙造型：电视墙、沙发背景墙等',
          '木作柜体：衣柜、橱柜、鞋柜等定制柜安装（也可在油漆后）',
          '门套、窗套基础制作'
        ],
        precautions: '吊顶建议用轻钢龙骨，比木龙骨更防潮防变形。石膏板接缝处留 3-5mm 伸缩缝，防止开裂。定制柜如果先装，要做好成品保护，避免油漆弄脏。'
      },
      {
        id: 'r7', title: '第 7 阶段：油漆工程', time: '约 10-15 天',
        steps: [
          '墙面基层处理：刷墙固/界面剂',
          '批刮腻子 2-3 遍：每遍等干透再刮下一遍',
          '打磨墙面：用砂纸打磨平整光滑',
          '刷底漆 1 遍',
          '刷面漆 2 遍：乳胶漆或艺术漆，调色需一次性调够',
          '木器漆施工：门窗套、柜体等木器上漆'
        ],
        precautions: '腻子一定要等干透了再刷漆，否则以后起皮脱落。乳胶漆要用同一批次调色，避免色差。油漆期间注意通风，但避免大风直吹导致开裂。做完油漆后打胶收口，让整体更精致。'
      },
      {
        id: 'r8', title: '第 8 阶段：安装收尾 + 软装进场', time: '约 15-20 天',
        steps: [
          '厨卫吊顶安装：铝扣板集成吊顶',
          '橱柜/定制柜安装：调整水平、检查五金',
          '木门/门套安装',
          '地板/踢脚线安装',
          '开关插座面板、灯具安装',
          '卫浴洁具安装：马桶、浴室柜、花洒、浴霸',
          '开荒保洁：全屋深度清洁',
          '家具家电进场：按规划摆放',
          '窗帘安装',
          '通风散味：至少 1-2 个月再入住'
        ],
        precautions: '安装顺序很重要：先装厨卫吊顶→橱柜→门套→地板→踢脚线→开关灯具→洁具。先保洁再进家具，避免二次污染。入住前至少通风 1-2 个月，可配合活性炭和空气净化器。'
      }
    ]
  },
  stone: {
    name: '精装房',
    emoji: '✨',
    color: 'stone',
    phases: [
      {
        id: 's1', title: '第 1 阶段：收房验房', time: '1-2 天（交房当日）',
        steps: [
          '带齐验房工具：空鼓锤、水平仪、相位仪、手电筒、卷尺',
          '全面检查：墙面空鼓/裂缝、地面平整度、门窗开关是否顺畅',
          '水电测试：每个插座通电、每个水龙头出水、地漏排水是否畅通',
          '瓷砖/地板仔细看：是否有色差、破损、空鼓',
          '记录全部问题：拍照 + 文字记录，要求开发商限期整改',

// ============ STATE ============
let currentType = 'raw';
let checkedPhases = { raw: {}, stone: {}, self: {} };

// Load saved state
try {
  const saved = JSON.parse(localStorage.getItem('decoration_guide_checked'));
  if (saved) checkedPhases = saved;
} catch(e) {}

function saveState() {
  localStorage.setItem('decoration_guide_checked', JSON.stringify(checkedPhases));
}

// ============ RENDER ============
function switchType(type) {
  currentType = type;

  // Update buttons
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.className = 'type-btn';
    if (btn.dataset.type === type) btn.classList.add('active-' + type);
  });

  renderAll();
  window.scrollTo({ top: 200, behavior: 'smooth' });
}

function renderAll() {
  renderStats();
  renderProgress();
  renderQuickNav();
  renderPhases();
  updateThemeClass();
}

function renderStats() {
  const d = data[currentType];
  const phases = d.phases;
  const checked = checkedPhases[currentType];
  const doneCount = phases.filter(p => checked[p.id]).length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item stat-${d.color}">
      <div class="num">${phases.length}</div>
      <div class="label">总阶段数</div>
    </div>
    <div class="stat-item stat-${d.color}">
      <div class="num">${doneCount}</div>
      <div class="label">已完成</div>
    </div>
    <div class="stat-item stat-${d.color}">
      <div class="num">${phases.length - doneCount}</div>
      <div class="label">待完成</div>
    </div>
  `;
}

function renderProgress() {
  const d = data[currentType];
  const phases = d.phases;
  const checked = checkedPhases[currentType];
  const doneCount = phases.filter(p => checked[p.id]).length;
  const pct = phases.length > 0 ? Math.round((doneCount / phases.length) * 100) : 0;

  document.getElementById('progressText').textContent = `${doneCount} / ${phases.length} 阶段完成`;
  const fill = document.getElementById('progressFill');
  fill.style.width = pct + '%';
  fill.className = 'progress-fill ' + d.color;
}

function renderQuickNav() {
  const d = data[currentType];
  const checked = checkedPhases[currentType];
  let html = '';
  d.phases.forEach((p, i) => {
    const done = checked[p.id] ? ' ✅' : '';
    html += `<button class="quick-nav-btn active-${d.color}" onclick="scrollToPhase('${p.id}')">${i+1}. ${p.title.replace(/第 \d+ 阶段：/, '')}${done}</button>`;
  });
  document.getElementById('quickNav').innerHTML = html;
}

function scrollToPhase(id) {
  const el = document.getElementById('phase-' + id);
  if (el) {
    // Open it first
    const card = el.closest('.phase-card');
    if (card && !card.classList.contains('open')) {
      card.classList.add('open');
    }
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function renderPhases() {
  const d = data[currentType];
  const checked = checkedPhases[currentType];
  const color = d.color;

  let html = '';
  d.phases.forEach((p, idx) => {
    const done = checked[p.id] || false;
    const checkedClass = done ? ' done' : '';

    html += `
    <div class="phase-card ${done ? 'completed' : ''}" id="phase-${p.id}">
      <div class="phase-header" onclick="togglePhase(this, '${p.id}')">
        <div class="phase-number ${color}">${idx + 1}</div>
        <div class="phase-info">
          <div class="phase-title">${p.title}</div>
          <div class="phase-time">⏱ ${p.time}</div>
        </div>
        <div class="phase-check${checkedClass}" onclick="event.stopPropagation(); toggleCheck('${p.id}')">${done ? '✓' : ''}</div>
        <div class="phase-arrow">▼</div>
      </div>
      <div class="phase-detail">
        <div class="phase-detail-inner">
          <div class="detail-section">
            <h4><span class="dot ${color}"></span> 操作步骤</h4>
            <ul class="step-list">
              ${p.steps.map(s => `<li class="${color}-dot">${s}</li>`).join('')}
            </ul>
          </div>
          ${p.precautions ? `
          <div class="precaution-box">
            <strong><span class="warn-icon">⚠️</span> 注意事项</strong><br>${p.precautions}
          </div>` : ''}
          ${getExtraTip(p.id, color)}
        </div>
      </div>
    </div>`;
  });

  document.getElementById('phasesContainer').innerHTML = html;
}

    'z3': '<div class="tooltip-box"><strong>💡 小贴士：</strong> 自建房窗户建议选断桥铝+双层钢化中空玻璃（5+12A+5），预算充足可以升级为三层中空或 Low-E 玻璃。窗户安装后一定要用发泡胶填充窗框和墙体缝隙，再打外墙耐候密封胶。</div>',
    'z6': '<div class="tooltip-box"><strong>💡 小贴士：</strong> 自建房防水"三必做"：屋顶必做、卫生间必做、外墙必做。"三检查"：闭水 48 小时后检查楼下、检查管道根部、雨季后再检查一次外墙和屋顶。</div>'
  };
  return tips[phaseId] || '';
}

function togglePhase(headerEl, phaseId) {
  const card = headerEl.closest('.phase-card');
  card.classList.toggle('open');
}

function toggleCheck(phaseId) {
  checkedPhases[currentType][phaseId] = !checkedPhases[currentType][phaseId];
  saveState();
  renderAll();
}

function resetAll() {
  if (confirm('确定要重置所有勾选状态吗？此操作不可撤销。')) {
    checkedPhases = { raw: {}, stone: {}, self: {} };
    saveState();
    renderAll();
  }
}

function updateThemeClass() {
  // Not needed for current design but kept for future
}

// ============ INIT ============
window.addEventListener('scroll', () => {
  const btn = document.getElementById('jumpTop');
  if (window.scrollY > 400) {
    btn.classList.add('visible');
  } else {
    btn.classList.remove('visible');
  }
});

// Init on load
renderAll();
</script>
